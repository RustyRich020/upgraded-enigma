<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160" fill="none">
  <defs>
    <linearGradient id="gg1" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C47B3A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2D8B5F" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="240" height="160" rx="12" fill="url(#gg1)"/>

  <!-- Central bot/agent circle -->
  <circle cx="120" cy="72" r="28" stroke="#C47B3A" stroke-width="2.5" fill="none" opacity="0.35"/>
  <circle cx="120" cy="72" r="20" fill="#C47B3A" opacity="0.08"/>

  <!-- Clock/schedule indicator inside -->
  <circle cx="120" cy="72" r="14" stroke="#C47B3A" stroke-width="1.5" fill="none" opacity="0.3"/>
  <line x1="120" y1="62" x2="120" y2="72" stroke="#C47B3A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="120" y1="72" x2="128" y2="76" stroke="#C47B3A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Orbiting dots (scheduled runs) -->
  <circle cx="120" cy="36" r="4" fill="#C47B3A" opacity="0.4"/>
  <circle cx="152" cy="56" r="3.5" fill="#2D8B5F" opacity="0.35"/>
  <circle cx="152" cy="88" r="3" fill="#C47B3A" opacity="0.3"/>
  <circle cx="120" cy="108" r="3.5" fill="#2D8B5F" opacity="0.35"/>
  <circle cx="88" cy="88" r="3" fill="#C47B3A" opacity="0.3"/>
  <circle cx="88" cy="56" r="3.5" fill="#2D8B5F" opacity="0.35"/>

  <!-- Orbit ring -->
  <circle cx="120" cy="72" r="36" stroke="#C47B3A" stroke-width="1" stroke-dasharray="4 6" fill="none" opacity="0.15"/>

  <!-- Output: job cards flowing out -->
  <rect x="170" y="56" width="40" height="12" rx="3" fill="#C47B3A" opacity="0.15"/>
  <rect x="178" y="72" width="36" height="12" rx="3" fill="#2D8B5F" opacity="0.12"/>
  <rect x="174" y="88" width="42" height="12" rx="3" fill="#C47B3A" opacity="0.1"/>

  <!-- Arrow from agent to cards -->
  <path d="M154 72h12" stroke="#C47B3A" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- "Auto" badge -->
  <rect x="34" y="118" width="48" height="20" rx="10" fill="#C47B3A" opacity="0.12"/>
  <text x="58" y="131" font-family="system-ui" font-size="9" font-weight="600" fill="#C47B3A" text-anchor="middle" opacity="0.6">Auto</text>
</svg>
