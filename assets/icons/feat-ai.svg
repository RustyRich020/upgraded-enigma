<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160" fill="none">
  <defs>
    <linearGradient id="aig1" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C47B3A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C47B3A" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="240" height="160" rx="12" fill="url(#aig1)"/>

  <!-- Letter/document shape -->
  <rect x="60" y="34" width="80" height="100" rx="6" stroke="#C47B3A" stroke-width="2.5" fill="none" opacity="0.3"/>
  <!-- Text lines -->
  <rect x="74" y="52" width="50" height="4" rx="2" fill="#C47B3A" opacity="0.2"/>
  <rect x="74" y="62" width="42" height="4" rx="2" fill="#C47B3A" opacity="0.15"/>
  <rect x="74" y="72" width="52" height="4" rx="2" fill="#C47B3A" opacity="0.2"/>
  <rect x="74" y="82" width="38" height="4" rx="2" fill="#C47B3A" opacity="0.15"/>
  <rect x="74" y="92" width="46" height="4" rx="2" fill="#C47B3A" opacity="0.18"/>
  <rect x="74" y="102" width="32" height="4" rx="2" fill="#C47B3A" opacity="0.12"/>
  <rect x="74" y="112" width="44" height="4" rx="2" fill="#C47B3A" opacity="0.15"/>

  <!-- AI sparkle/wand -->
  <g transform="translate(160, 60)">
    <!-- Wand -->
    <line x1="0" y1="40" x2="30" y2="0" stroke="#C47B3A" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Sparkles -->
    <circle cx="30" cy="0" r="3" fill="#C47B3A" opacity="0.6"/>
    <circle cx="40" cy="8" r="2" fill="#C47B3A" opacity="0.4"/>
    <circle cx="36" cy="-8" r="2" fill="#C47B3A" opacity="0.35"/>
    <circle cx="22" cy="-6" r="1.5" fill="#C47B3A" opacity="0.3"/>
    <!-- Star burst -->
    <path d="M30 0l2-6 2 6 6 2-6 2-2 6-2-6-6-2z" fill="#C47B3A" opacity="0.25"/>
  </g>

  <!-- "Generated" badge -->
  <rect x="155" y="112" width="60" height="20" rx="10" fill="#2D8B5F" opacity="0.15"/>
  <text x="185" y="125" font-family="system-ui" font-size="9" font-weight="600" fill="#2D8B5F" text-anchor="middle" opacity="0.6">AI Ready</text>
</svg>
