<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160" fill="none">
  <defs>
    <linearGradient id="ig1" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D8B5F" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C47B3A" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="240" height="160" rx="12" fill="url(#ig1)"/>

  <!-- Chat bubbles representing Q&A -->
  <!-- Question bubble (left) -->
  <rect x="36" y="32" width="100" height="28" rx="14" fill="#C47B3A" opacity="0.12"/>
  <rect x="48" y="42" width="60" height="4" rx="2" fill="#C47B3A" opacity="0.2"/>
  <rect x="48" y="50" width="40" height="4" rx="2" fill="#C47B3A" opacity="0.15"/>

  <!-- Answer bubble (right) -->
  <rect x="104" y="68" width="100" height="28" rx="14" fill="#2D8B5F" opacity="0.12"/>
  <rect x="116" y="78" width="70" height="4" rx="2" fill="#2D8B5F" opacity="0.2"/>
  <rect x="116" y="86" width="50" height="4" rx="2" fill="#2D8B5F" opacity="0.15"/>

  <!-- Question bubble 2 -->
  <rect x="36" y="104" width="90" height="28" rx="14" fill="#C47B3A" opacity="0.1"/>
  <rect x="48" y="114" width="55" height="4" rx="2" fill="#C47B3A" opacity="0.18"/>
  <rect x="48" y="122" width="35" height="4" rx="2" fill="#C47B3A" opacity="0.12"/>

  <!-- Numbers/count indicator -->
  <g transform="translate(180, 112)">
    <circle r="16" fill="#C47B3A" opacity="0.1"/>
    <text y="4" font-family="system-ui" font-size="14" font-weight="700" fill="#C47B3A" text-anchor="middle" opacity="0.6">10</text>
  </g>

  <!-- Person silhouette -->
  <circle cx="26" cy="44" r="5" fill="#C47B3A" opacity="0.2"/>
  <circle cx="214" cy="80" r="5" fill="#2D8B5F" opacity="0.2"/>

  <!-- AI sparkle near answers -->
  <path d="M210 68l1.5-4 1.5 4 4 1.5-4 1.5-1.5 4-1.5-4-4-1.5z" fill="#2D8B5F" opacity="0.3"/>
</svg>
