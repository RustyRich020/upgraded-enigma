<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found — JobSynk</title>
  <meta name="theme-color" content="#C47B3A">
  <link rel="icon" type="image/png" href="/assets/icons/favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background:
        radial-gradient(ellipse at 30% 10%, rgba(196,123,58,0.08), transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(45,139,95,0.05), transparent 40%),
        #FFFFFF;
      color: #2D2D2D;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 480px; }
    .logo {
      width: 64px; height: 64px;
      margin: 0 auto 24px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(196,123,58,0.15);
    }
    .logo img { width: 100%; height: 100%; }
    h1 {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #C47B3A, #E8A862);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 12px;
    }
    h2 {
      font-size: 22px;
      font-weight: 600;
      color: #1A1A1A;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #6B7280;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      background: #C47B3A; color: #fff;
      padding: 12px 28px; border-radius: 12px;
      font-size: 15px; font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(196,123,58,0.25);
    }
    a:hover { background: #D4874D; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(196,123,58,0.3); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><img src="/assets/icons/favicon.png" alt="JobSynk"></div>
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/">
      Go to JobSynk
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14m-7-7l7 7-7 7"/></svg>
    </a>
  </div>
</body>
</html>
